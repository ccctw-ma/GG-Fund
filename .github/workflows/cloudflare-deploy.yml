name: Cloudflare Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  CF_PAGES_PROJECT: gg-fund
  CF_PAGES_BRANCH: master
  CF_D1_DATABASE: gg-fund-db
  CF_VERIFY_BASE_URL: https://gg-fund.pages.dev

jobs:
  deploy:
    name: Deploy To Cloudflare
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ vars.CLOUDFLARE_DEPLOY_ENABLED == 'true' }}

    permissions:
      contents: read
      deployments: write

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PUPPETEER_SKIP_DOWNLOAD: "1"
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "1"
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        timeout-minutes: 5
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Deploy Cloudflare Pages
        run: bun run deploy:cloudflare

      - name: Verify production endpoints
        run: bun run verify:cloudflare
