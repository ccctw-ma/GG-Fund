name: Cloudflare Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  CF_PAGES_PROJECT: gg-fund
  CF_PAGES_BRANCH: master
  CF_D1_DATABASE: gg-fund-db
  CF_VERIFY_BASE_URL: https://gg-fund.pages.dev

jobs:
  test:
    name: Test And Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Restore Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-1.3.10-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.10-

      - name: Install dependencies
        run: bash scripts/ci-bun-install.sh

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run CI tests
        run: bun run ci:test

  deploy:
    name: Deploy To Cloudflare
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'

    permissions:
      contents: read
      deployments: write

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Restore Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-1.3.10-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.10-

      - name: Install dependencies
        run: bash scripts/ci-bun-install.sh

      - name: Deploy Cloudflare Pages
        run: bun run deploy:cloudflare

      - name: Verify production endpoints
        run: bun run verify:cloudflare
