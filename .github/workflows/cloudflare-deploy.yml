name: Cloudflare Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  CF_WORKER_NAME: ${{ vars.CF_WORKER_NAME || 'gg-fund' }}
  CF_D1_DATABASE: ${{ vars.CF_D1_DATABASE || 'gg-fund-db' }}
  CF_VERIFY_BASE_URL: ${{ vars.CF_VERIFY_BASE_URL || format('https://{0}.workers.dev', vars.CF_WORKER_NAME || 'gg-fund') }}
  NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  deploy:
    name: Deploy To Cloudflare
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ vars.CLOUDFLARE_DEPLOY_ENABLED == 'true' }}

    permissions:
      contents: read
      deployments: write

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PUPPETEER_SKIP_DOWNLOAD: "1"
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "1"
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        timeout-minutes: 5
        run: bash scripts/ci-install.sh

      - name: Build OpenNext worker
        run: |
          bun run build
          bunx --package @opennextjs/cloudflare opennextjs-cloudflare build

      - name: Apply remote D1 migrations
        run: bunx wrangler d1 migrations apply "${CF_D1_DATABASE}" --remote --config wrangler.jsonc

      - name: Deploy Cloudflare worker
        run: bunx wrangler deploy --config wrangler.jsonc --name "${CF_WORKER_NAME}"

      - name: Verify deployment
        run: bun run verify:cloudflare
